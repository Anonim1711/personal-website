<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Usmonbek Anvarbekov</title>
<!-- CKEditor 5 classic build (pre-v42: global ClassicEditor, no license key needed) -->
<script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/ckeditor.js"></script>
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#0B0B0C;color:#EAE7DF;font-family:'Space Grotesk',system-ui,sans-serif;}
  a{color:#C6432B;}
  h1,h2{font-weight:500;letter-spacing:-.02em;}
  .wrap{max-width:900px;margin:0 auto;padding:32px 20px 120px;}
  .mono{font-family:'Space Mono',ui-monospace,monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:rgba(234,231,223,.55);}
  input,textarea,button{font-family:inherit;font-size:15px;}
  input,textarea{width:100%;background:#141416;border:1px solid rgba(234,231,223,.16);color:#EAE7DF;padding:10px 12px;border-radius:2px;}
  textarea{min-height:110px;resize:vertical;}
  label{display:block;margin:14px 0 6px;}
  button{cursor:pointer;background:#C6432B;color:#0B0B0C;border:none;padding:10px 18px;border-radius:2px;font-weight:600;}
  button.ghost{background:transparent;color:#EAE7DF;border:1px solid rgba(234,231,223,.24);}
  button.danger{background:transparent;color:#C6432B;border:1px solid rgba(198,67,43,.5);}
  .tabs{display:flex;flex-wrap:wrap;gap:6px;margin:24px 0 28px;border-bottom:1px solid rgba(234,231,223,.14);padding-bottom:14px;}
  .tabs button{background:transparent;color:rgba(234,231,223,.6);border:1px solid rgba(234,231,223,.16);padding:7px 14px;font-weight:500;}
  .tabs button.active{background:#EAE7DF;color:#0B0B0C;}
  .card{border:1px solid rgba(234,231,223,.14);background:#141416;padding:18px;margin-bottom:14px;border-radius:2px;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .row .grow{flex:1;min-width:120px;}
  .thumb{max-width:120px;max-height:120px;border:1px solid rgba(234,231,223,.16);margin-top:8px;display:block;}
  .list-item{border:1px solid rgba(234,231,223,.12);padding:14px;margin-bottom:10px;border-radius:2px;display:flex;justify-content:space-between;gap:12px;align-items:flex-start;}
  .list-item .meta{flex:1;min-width:0;}
  .list-item .meta b{display:block;}
  .list-item .meta span{color:rgba(234,231,223,.6);font-size:14px;}
  .hidden{display:none;}
  #login{max-width:340px;margin:14vh auto 0;}
  .status{color:rgba(234,231,223,.55);font-size:13px;margin-left:10px;}
</style>
</head>
<body>
<div class="wrap">
  <!-- login -->
  <div id="login">
    <h1>Admin</h1>
    <p class="mono">Enter password to edit the site.</p>
    <input id="pw" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
    <div style="margin-top:14px"><button onclick="login()">Log in</button><span class="status" id="loginErr"></span></div>
  </div>

  <!-- panel -->
  <div id="panel" class="hidden">
    <div class="row" style="justify-content:space-between">
      <h1 style="margin:0">Site content</h1>
      <div><a href="/" class="mono">View site ↗</a>
        <button class="ghost" style="margin-left:12px" onclick="logout()">Log out</button></div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div id="view"></div>
  </div>
</div>

<script>
const SECTIONS = ['about','writing','books','movies','projects','notes','links'];
// field -> input kind. 'file-image' / 'file-video' post to /api/upload.
const SCHEMA = {
  about:    [['photo','file-image'],['text','textarea'],['location','text']],
  writing:  [['photo','file-image'],['title','text'],['text','textarea']],
  books:    [['cover','file-image'],['name','text'],['author','text'],['review','textarea']],
  movies:   [['video','file-video'],['name','text'],['author','text'],['review','textarea']],
  projects: [['title','text'],['release_date','text'],['description','textarea'],['skills','list']],
  notes:    [['text','textarea']],
  links:    [['label','text'],['value','text'],['url','text']],
};
const LABELS = {photo:'Photo',cover:'Cover',video:'Video',text:'Text',title:'Title',name:'Name',
  author:'Author',review:'Review',description:'Description',release_date:'Release date',
  skills:'Skills (comma-separated)',location:'Location',
  label:'Label (e.g. Telegram)',value:'Display text (e.g. @usmon)',url:'Link URL (e.g. https://t.me/usmon)'};
let current = 'about';

async function api(method, path, body){
  const opt = {method, headers:{}};
  if(body){ opt.headers['Content-Type']='application/json'; opt.body=JSON.stringify(body); }
  const r = await fetch('/api'+path, opt);
  if(r.status===401){ showLogin(); throw new Error('unauthorized'); }
  if(!r.ok) throw new Error(await r.text());
  return r.status===204 ? null : r.json();
}
async function uploadFile(file){
  const fd = new FormData(); fd.append('file', file);
  const r = await fetch('/api/upload', {method:'POST', body:fd});
  if(!r.ok) throw new Error('upload failed');
  return (await r.json()).url;
}

const loginBox = document.getElementById('login');
function showLogin(){ panel.classList.add('hidden'); loginBox.classList.remove('hidden'); }
async function login(){
  loginErr.textContent='';
  try{
    await api('POST','/login',{password:pw.value});
    start();
  }catch(e){ loginErr.textContent='Wrong password'; }
}
async function logout(){ await api('POST','/logout'); location.reload(); }

async function start(){
  loginBox.classList.add('hidden'); panel.classList.remove('hidden');
  tabs.innerHTML='';
  SECTIONS.forEach(s=>{
    const b=document.createElement('button');
    b.textContent=s; b.onclick=()=>{current=s; render();};
    b.dataset.sec=s; tabs.appendChild(b);
  });
  render();
}

function fieldInput(field, kind, value){
  const id='f_'+field;
  if(kind==='textarea') return `<textarea id="${id}">${esc(value||'')}</textarea>`;
  if(kind==='list') return `<input id="${id}" value="${esc((value||[]).join(', '))}">`;
  if(kind==='file-image'||kind==='file-video'){
    const accept = kind==='file-image'?'image/*':'video/*';
    const prev = value ? (kind==='file-image'
        ? `<img class="thumb" src="${esc(value)}">`
        : `<video class="thumb" src="${esc(value)}" muted></video>`) : '';
    return `<input type="hidden" id="${id}" value="${esc(value||'')}">
      <input type="file" accept="${accept}" onchange="onUpload(this,'${id}','${kind}')">
      <div id="${id}_prev">${prev}</div>`;
  }
  return `<input id="${id}" value="${esc(value||'')}">`;
}
async function onUpload(inp, targetId, kind){
  const f=inp.files[0]; if(!f) return;
  inp.disabled=true;
  try{
    const url=await uploadFile(f);
    document.getElementById(targetId).value=url;
    document.getElementById(targetId+'_prev').innerHTML = kind==='file-image'
      ? `<img class="thumb" src="${esc(url)}">` : `<video class="thumb" src="${esc(url)}" muted></video>`;
  }catch(e){ alert('Upload failed'); } finally{ inp.disabled=false; }
}
// CKEditor instances, keyed by their <textarea> element (ids collide between the
// add form and an inline edit form, so we key by element and scope reads to a container).
const editors = new Map();
function mountEditors(container){
  if(!container || !window.ClassicEditor) return;
  container.querySelectorAll('textarea').forEach(ta=>{
    if(editors.has(ta)) return;
    ClassicEditor.create(ta).then(ed=>editors.set(ta, ed)).catch(()=>{});
  });
}
function destroyEditors(){
  editors.forEach(ed=>{ try{ ed.destroy(); }catch(e){} });
  editors.clear();
}
function collect(section, container){
  container = container || document;
  const out={};
  for(const [field,kind] of SCHEMA[section]){
    const el=container.querySelector('#f_'+field); if(!el) continue;
    if(kind==='list') out[field]=el.value.split(',').map(s=>s.trim()).filter(Boolean);
    else if(kind==='textarea') out[field]= editors.has(el) ? editors.get(el).getData() : el.value;
    else out[field]=el.value;
  }
  return out;
}

async function render(){
  destroyEditors();  // view is about to be rebuilt; drop any live editors first
  [...tabs.children].forEach(b=>b.classList.toggle('active', b.dataset.sec===current));
  view.innerHTML='<p class="mono">Loading…</p>';
  const data = await api('GET','/'+current);
  if(current==='about'){ renderAbout(data); return; }
  renderCollection(current, data);
}

function formHtml(section, item){
  return SCHEMA[section].map(([field,kind])=>
    `<label>${LABELS[field]||field}</label>${fieldInput(field,kind,item?item[field]:'')}`
  ).join('');
}

function renderAbout(item){
  view.innerHTML = `<h2>About</h2><div class="card">${formHtml('about',item)}
    <div style="margin-top:16px"><button onclick="saveAbout()">Save</button><span class="status" id="msg"></span></div></div>`;
  mountEditors(view);
}
async function saveAbout(){
  msg.textContent='Saving…';
  await api('PUT','/about', collect('about', view));
  msg.textContent='Saved ✓';
}

function renderCollection(section, items){
  const label = section.charAt(0).toUpperCase()+section.slice(1);
  view.innerHTML = `<h2>${label}</h2>
    <div class="card"><div class="mono">Add new</div><div id="addform">${formHtml(section,null)}</div>
      <div style="margin-top:16px"><button onclick="addItem('${section}')">Add</button><span class="status" id="msg"></span></div></div>
    <div id="items"></div>`;
  mountEditors(document.getElementById('addform'));
  const box=document.getElementById('items');
  if(!items.length){ box.innerHTML='<p class="mono">Nothing yet.</p>'; return; }
  items.forEach(it=>{
    const div=document.createElement('div'); div.className='list-item';
    div.innerHTML=`<div class="meta"><b>${esc(it.name||it.title||it.label||'(note)')}</b>
      <span>${esc((it.author? it.author+' · ':'')+(it.text||it.review||it.description||it.value||it.url||'').slice(0,90))}</span></div>
      <div class="row"><button class="ghost" onclick='editItem("${section}",${it.id})'>Edit</button>
      <button class="danger" onclick='delItem("${section}",${it.id})'>Delete</button></div>`;
    box.appendChild(div);
    div.dataset.item=JSON.stringify(it);
  });
}
async function addItem(section){
  msg.textContent='Saving…';
  await api('POST','/'+section, collect(section, document.getElementById('addform')));
  render();
}
function editItem(section, id){
  const div=[...document.querySelectorAll('.list-item')].find(d=>JSON.parse(d.dataset.item).id===id);
  const it=JSON.parse(div.dataset.item);
  div.innerHTML=`<div class="meta" style="flex:1">${formHtml(section,it)}
    <div style="margin-top:14px"><button onclick='saveEdit("${section}",${id})'>Save</button>
    <button class="ghost" onclick='render()'>Cancel</button></div></div>`;
  mountEditors(div);
}
async function saveEdit(section, id){
  const div=[...document.querySelectorAll('.list-item')].find(d=>JSON.parse(d.dataset.item).id===id);
  await api('PUT','/'+section+'/'+id, collect(section, div));
  render();
}
async function delItem(section, id){
  if(!confirm('Delete this?')) return;
  await api('DELETE','/'+section+'/'+id);
  render();
}

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// auto-login if session already active
api('GET','/me').then(r=>{ if(r.admin) start(); }).catch(()=>{});
</script>
</body>
</html>
