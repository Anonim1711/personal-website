<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<script src="./particles.js" defer></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{background:#0B0B0C;color:#EAE7DF;font-family:'Space Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden;}
    a{color:#C6432B;text-decoration:none;}
    a:hover{color:#EAE7DF;}
    ::selection{background:#C6432B;color:#0B0B0C;}
  </style>
</helmet>
<div style="position:relative;min-height:100vh;background:transparent;color:#EAE7DF;overflow:hidden;">
  <div aria-hidden="true" style="position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(90deg,rgba(234,231,223,.04) 1px,transparent 1px);background-size:clamp(64px,20vw,132px) 100%;"></div>

  <header style="position:fixed;top:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;align-items:center;gap:12px;padding:15px clamp(16px,4vw,40px) 26px;background:linear-gradient(to bottom,#0B0B0C 52%,rgba(11,11,12,.72) 78%,rgba(11,11,12,0));backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);font-family:'Space Mono',monospace;font-size:clamp(10px,2.6vw,12px);letter-spacing:.08em;color:rgba(234,231,223,.82);text-transform:uppercase;">
    <a href="/" style="color:rgba(234,231,223,.82);display:inline-flex;align-items:center;gap:8px;" style-hover="color:#C6432B;"><span>←</span> Index</a>
    <span style="opacity:.55;">Projects</span>
  </header>

  <main style="position:relative;z-index:2;max-width:1080px;margin:0 auto;">
    <section style="padding:clamp(112px,18vh,200px) clamp(16px,4vw,40px) clamp(24px,5vh,44px);">
      <div style="display:flex;align-items:center;gap:10px;font-family:'Space Mono',monospace;font-size:clamp(10px,2.6vw,12px);letter-spacing:.14em;text-transform:uppercase;color:rgba(234,231,223,.55);margin-bottom:clamp(18px,4vh,32px);">
        <span style="width:8px;height:8px;background:#C6432B;border-radius:50%;display:inline-block;flex:none;"></span>
        04 — Projects · things I've built
      </div>
      <h1 style="margin:0;font-weight:500;line-height:.86;letter-spacing:-.035em;font-size:clamp(3rem,13vw,9rem);">Projects</h1>
    </section>

    <section style="padding:0 clamp(16px,4vw,40px) clamp(72px,14vh,140px);">
      <sc-for list="{{ projects }}" as="p" hint-placeholder-count="4">
        <a href="#" style="display:block;padding:clamp(26px,5vh,44px) 0;border-top:1px solid rgba(234,231,223,.14);color:inherit;" style-hover="opacity:.85;">
          <div style="display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;">
            <div style="font-weight:600;font-size:clamp(1.7rem,7vw,3.2rem);letter-spacing:-.025em;line-height:1;">{{ p.title }}</div>
            <div style="font-family:'Space Mono',monospace;font-size:clamp(10px,2.6vw,13px);letter-spacing:.08em;text-transform:uppercase;color:rgba(234,231,223,.5);white-space:nowrap;">{{ p.release_date }}</div>
          </div>
          <div dc-html="{{ p.description }}" style="max-width:60ch;margin:clamp(14px,2.5vh,22px) 0 0;font-size:clamp(1rem,3.6vw,1.2rem);line-height:1.55;color:rgba(234,231,223,.72);text-wrap:pretty;"></div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:clamp(16px,3vh,22px);">
            <sc-for list="{{ p.skills }}" as="sk" hint-placeholder-count="3">
              <span style="font-family:'Space Mono',monospace;font-size:clamp(9px,2.4vw,11px);letter-spacing:.06em;text-transform:uppercase;color:rgba(234,231,223,.62);border:1px solid rgba(234,231,223,.16);padding:5px 11px;">{{ sk }}</span>
            </sc-for>
          </div>
        </a>
      </sc-for>
      <div style="border-top:1px solid rgba(234,231,223,.14);"></div>
    </section>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { projects: [] };
  componentDidMount() {
    fetch('/api/projects').then(r => r.json()).then(projects => this.setState({ projects })).catch(() => {});
  }
  renderVals() { return { projects: this.state.projects }; }
}
</script>
</body>
</html>
